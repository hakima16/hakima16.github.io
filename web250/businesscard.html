<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hakima Web Design Enterprises</title>

<style>
    body {
        margin: 0;
        padding: 0;
        background: #f5f2fa;
        font-family: "Poppins", Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .card {
        width: 540px;
        max-width: 90%;
        background: #ffffff;
        border-radius: 18px;
        padding: 28px 32px;
        box-shadow: 0 10px 30px rgba(150, 120, 255, 0.25);
        border: 2px solid #c9b3ff;
        display: flex;
        gap: 28px;
    }

    .logo {
        width: 100px;
        height: 100px;
        background: radial-gradient(circle at top left, #ffb3e6, #b38bff, #7a5cff);
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
        font-size: 36px;
        font-weight: 700;
        letter-spacing: 1px;
        flex-shrink: 0;
        box-shadow: 0 0 18px rgba(180, 130, 255, 0.5);
    }

    .info-section {
        flex: 1;
    }

    h1 {
        margin: 0;
        font-size: 23px;
        color: #3a2a6a;
        font-weight: 700;
    }

    .tagline {
        font-size: 14px;
        color: #a06bff;
        margin-bottom: 16px;
        font-weight: 600;
        letter-spacing: 0.5px;
    }

    .label {
        font-weight: 600;
        margin-top: 6px;
        color: #3a2a6a;
        font-size: 14px;
    }

    .text {
        margin: 2px 0 8px;
        color: #5a4a7a;
        font-size: 15px;
    }

    a {
        color: #a06bff;
        text-decoration: none;
        font-weight: 600;
    }
</style>
</head>

<body>

<div class="card">

    <div class="logo">HE</div>

    <div class="info-section">
        <h1>Hakima Web Design Enterprises</h1>
        <div class="tagline">“Elegant Design. Modern Tech.”</div>

        <div class="label">Name</div>
        <div class="text">Hakima Chabane</div>

        <div class="label">Phone</div>
        <div class="text">(555) 987‑6543</div>

        <div class="label">Email</div>
        <div class="text"><a href="mailto:hakima@hwenterprises.com">hakima@hwenterprises.com</a></div>

        <div class="label">Address</div>
        <div class="text">
            1200 Innovation Way<br>
            Charlotte, NC 28202
        </div>
    </div>

</div>

</body>
</html>
